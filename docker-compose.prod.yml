version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: be_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-university_cms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: be_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: be_minio_prod
    restart: always
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_prod_data:/data

  omniroute:
    image: litellm/litellm:main-latest
    container_name: omniroute_gateway_prod
    ports:
      - "8090:4000"
    volumes:
      - ./omniroute/config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    environment:
      - LITELLM_MASTER_KEY=${AI_API_KEY:-sk-omniroute-secret-key}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be_api_prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DEBUG=false
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-university_cms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_password}
      - MINIO_SECURE=false
      - MINIO_BUCKET=${MINIO_BUCKET:-university-media}
      - AI_PROVIDER=omniroute
      - AI_BASE_URL=http://omniroute:4000
      - AI_API_KEY=${AI_API_KEY:-sk-omniroute-secret-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RUN_MIGRATIONS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
